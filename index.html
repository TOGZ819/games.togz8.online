    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #282a36;
            --bg2: #1e2030;
            --fg: #f8f8f2;
            --accent: #bd93f9;
            --accent2: #ff79c6;
            --green: #50fa7b;
            --orange: #ffb86c;
            --red: #ff5555;
            --cyan: #8be9fd;
            --dim: rgba(248,248,242,0.35);
            --border: rgba(248,248,242,0.12);
            --glass: rgba(40,42,54,0.85);
            --primary: #bd93f9;
            --primary-hover: #ff79c6;
            --primary-light: rgba(189,147,249,0.12);
            --surface: #313447;
            --surface-hover: #3d4060;
            --radius: 4px;
            --radius-lg: 6px;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        html, body {
            background: var(--bg2);
            color: var(--fg);
            font-family: 'Courier New', 'Consolas', monospace;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.18) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.015), rgba(0,0,255,0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }

        body::after {
            content: "";
            position: fixed; inset: 0;
            background: linear-gradient(transparent 0%, rgba(0,0,0,0.04) 100%);
            animation: flicker 9s infinite;
            pointer-events: none;
            z-index: 9998;
        }

        @keyframes flicker {
            0%,100% { opacity: 1; }
            91% { opacity: 1; }
            92% { opacity: 0.88; }
            93% { opacity: 1; }
            96% { opacity: 0.93; }
            97% { opacity: 1; }
        }

        header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.9rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.25rem;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-shadow: 0 0 18px rgba(189,147,249,0.6), 0 0 40px rgba(189,147,249,0.2);
            text-transform: uppercase;
            position: relative;
            flex-shrink: 0;
            animation: logo-glow 3s ease-in-out infinite alternate;
        }

        .logo::after {
            content: attr(data-text);
            position: absolute;
            left: 2px; top: 1px;
            color: var(--accent2);
            opacity: 0;
            animation: glitch 7s infinite;
        }

        @keyframes logo-glow {
            from { text-shadow: 0 0 14px rgba(189,147,249,0.5); }
            to   { text-shadow: 0 0 28px rgba(189,147,249,0.9), 0 0 60px rgba(189,147,249,0.3); }
        }

        @keyframes glitch {
            0%,93%,100% { opacity: 0; transform: none; }
            94% { opacity: 0.7; transform: translate(-3px, 1px) skew(-2deg); }
            95% { opacity: 0; }
            97% { opacity: 0.5; transform: translate(3px, -1px); }
            98% { opacity: 0; }
        }

        .search-container {
            display: flex;
            flex: 1;
            max-width: 520px;
            gap: 0.6rem;
        }

        #searchBar {
            flex: 1;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--fg);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.05em;
        }

        #searchBar::placeholder { color: var(--dim); }

        #searchBar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(189,147,249,0.2), 0 0 12px rgba(189,147,249,0.15);
        }

        #sortOptions, #filterOptions {
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--dim);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 0.05em;
        }

        #sortOptions:hover, #filterOptions:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        #sortOptions option, #filterOptions option {
            background: var(--bg);
        }

        .control-buttons { display: flex; gap: 0.4rem; }

        .control-button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--dim);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
        }

        .control-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px rgba(189,147,249,0.25);
        }

        .control-button img {
            width: 18px; height: 18px;
            filter: invert(0.7);
            transition: transform 0.4s ease, filter 0.2s;
        }

        .control-button:hover img {
            transform: rotate(40deg);
            filter: invert(0.7) sepia(1) hue-rotate(220deg);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.8rem 1.2rem 6rem;
        }

        details summary {
            font-size: 0.75rem;
            font-weight: normal;
            cursor: pointer;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--dim);
            padding: 0.5rem 0;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
        }

        details summary::before {
            content: "▶";
            font-size: 0.6rem;
            color: var(--accent);
            transition: transform 0.2s;
        }

        details[open] summary::before { transform: rotate(90deg); }

        details summary::-webkit-details-marker { display: none; }

        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.2rem 0;
        }

        #container, #featuredZones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .zone-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .zone-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(189,147,249,0.06), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1;

        .zone-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 20px rgba(189,147,249,0.15);

        .zone-item:hover::before { opacity: 1; }

        .zone-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--bg);
            transition: transform 0.3s;
            filter: brightness(0.9);

        .zone-item:hover img {
            transform: scale(1.04);
            filter: brightness(1);

        .zone-item button {
            background: transparent;
            color: var(--dim);
            border: 0;

            font-size: 12px;
            letter-spacing: 0.06em;

            text-align: center;

            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;

        .zone-item:hover button { color: var(--accent); }

        #zoneViewer {
            position: fixed;
            inset: 0;
            background: var(--bg2);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .zone-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            color: var(--fg);
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;

        .zone-title { flex: 1; min-width: 0; }

        #zoneName {
            font-size: 1rem;
            font-weight: normal;
            margin: 0 0 0.2rem;

            text-shadow: 0 0 12px rgba(189,147,249,0.5);

        #zoneId { display: none; }

        #zoneAuthor {
            font-size: 11px;
            color: var(--dim);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        #zoneAuthor:hover { color: var(--accent2); }

        .zone-controls { display: flex; gap: 0.5rem; }

        .zone-controls button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;

        .zone-controls button:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px rgba(189,147,249,0.2);

        #zoneFrame {

            border: none;

        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .popup {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow), 0 0 40px rgba(189,147,249,0.1);

            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;

        .popup-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.2rem;

            letter-spacing: 0.2em;
            text-transform: uppercase;

        #popupClose {

            border: 1px solid var(--border);

            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;

        #popupClose:hover { border-color: var(--red); color: var(--red); }

        #popupBody {
            padding: 1.2rem;
            overflow-y: auto;

            font-size: 13px;
            line-height: 1.7;

        #popupBody input[type="text"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            margin-bottom: 1rem;

            border-radius: var(--radius);
            background: var(--bg);
            color: var(--fg);

            font-size: 13px;
            outline: none;

        }

        #popupBody input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(189,147,249,0.15);
        }

        .settings-button {
            background: var(--bg);
            color: var(--dim);
            border: 1px solid var(--border);
            padding: 0.7rem 1.2rem;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: var(--radius);
            cursor: pointer;

        }

        .settings-button::before { content: "> "; color: var(--accent); }

        .settings-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 12px rgba(189,147,249,0.15);

        .info-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;

            display: inline-flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;
            transition: color 0.2s;
            color: var(--dim);
            vertical-align: middle;
        }

        .info-button:hover { color: var(--accent); }

        footer {
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 0.8rem 1rem;
            text-align: center;
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            z-index: 100;
        }

        .footer-links {
            display: flex;
            justify-content: center;

        .footer-links a {
            color: var(--dim);
            text-decoration: none;
            font-size: 11px;

        }

        .footer-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(189,147,249,0.5);

        .status-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;

        .status-dot {
            display: inline-block;

            box-shadow: 0 0 6px var(--green);

        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 5px var(--green); }
            50% { opacity: 0.4; box-shadow: none; }

        @media (max-width: 768px) {

    <script>
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');
const sortOptions = document.getElementById('sortOptions');
const filterOptions = document.getElementById('filterOptions');
const zonesurls = [
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
let zones = [];
let popularityData = {};
const featuredContainer = document.getElementById('featuredZones');

function toTitleCase(str) {
    return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substring(1).toLowerCase());
}

async function listZones() {
    try {
        let sharesponse, shajson, sha;
        try { sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t=" + Date.now()); } catch (e) {}
        if (sharesponse && sharesponse.status === 200) {
            try {
                shajson = await sharesponse.json();
                sha = shajson[0]['sha'];
                if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
            } catch (e) {
                try {
                    let r = await fetch("https://raw.githubusercontent.com/freebuisness/xml/refs/heads/main/sha.txt?t=" + Date.now());
                    if (r && r.status === 200) { sha = (await r.text()).trim(); if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`; }
                } catch (e) {}
            }
        }
        const response = await fetch(zonesURL + "?t=" + Date.now());
        const json = await response.json();
        zones = json;
        zones = zones.filter(z => z.id !== -1 && z.id !== 596);
        zones[0].featured = true;
        await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"), fetchPopularity("day")]);
        sortZones();
        try {
            const search = new URLSearchParams(window.location.search);
            const id = search.get('id');
            const embed = window.location.hash.includes("embed");
            if (id) {
                const zone = zones.find(z => z.id + '' == id + '');

async function fetchPopularity(duration) {
    try {
        if (!popularityData[duration]) popularityData[duration] = {};
        const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration);
        const data = await response.json();
        data.forEach(file => {
            const m = file.name.match(/\/(\d+)\.html$/);
            if (m) popularityData[duration][parseInt(m[1])] = file.hits?.total ?? 0;
        });
    } catch (e) {
        if (!popularityData[duration]) popularityData[duration] = {};
        popularityData[duration][0] = 0;
    }
}

function sortZones() {
    const s = sortOptions.value;
    if (s === 'name') zones.sort((a, b) => a.name.localeCompare(b.name));
    else if (s === 'id') zones.sort((a, b) => a.id - b.id);
    else if (s === 'popular') zones.sort((a, b) => ((popularityData['year']?.[b.id]) ?? 0) - ((popularityData['year']?.[a.id]) ?? 0));
    else if (s === 'trendingMonth') zones.sort((a, b) => ((popularityData['month']?.[b.id]) ?? 0) - ((popularityData['month']?.[a.id]) ?? 0));
    else if (s === 'trendingWeek') zones.sort((a, b) => ((popularityData['week']?.[b.id]) ?? 0) - ((popularityData['week']?.[a.id]) ?? 0));
    else if (s === 'trendingDay') zones.sort((a, b) => ((popularityData['day']?.[b.id]) ?? 0) - ((popularityData['day']?.[a.id]) ?? 0));
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    if (featuredContainer.innerHTML === "") displayFeaturedZones(zones.filter(z => z.featured));
    displayZones(zones);
}

function makeLazyObserver(selector) {
    const imgs = document.querySelectorAll(selector + ' img.lazy-zone-img');
    const obs = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !zoneViewer.hidden) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove("lazy-zone-img");
                observer.unobserve(img);
            }
        });
    }, { rootMargin: "100px", threshold: 0.1 });
    imgs.forEach(img => obs.observe(img));
}

function buildZoneItem(file) {

function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
    if (typeof obj === 'string') return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
    if (obj instanceof Uint8Array) return obj.length > maxArrayLen ? `[Uint8Array too large (${obj.length} bytes)]` : obj;
    if (Array.isArray(obj)) return obj.map(i => sanitizeData(i, maxStringLen, maxArrayLen));
    if (obj && typeof obj === 'object') { const n = {}; for (const k in obj) if (obj.hasOwnProperty(k)) n[k] = sanitizeData(obj[k], maxStringLen, maxArrayLen); return n; }
    return obj;
}

async function saveData() {
    alert("This might take a while, dont touch anything other than this OK button");
    const result = { cookies: document.cookie, localStorage: {...localStorage}, sessionStorage: {...sessionStorage}, indexedDB: {}, caches: {} };
    const dbs = await indexedDB.databases();
    for (const dbInfo of dbs) {
        if (!dbInfo.name) continue;
        result.indexedDB[dbInfo.name] = {};
        await new Promise((resolve, reject) => {
            const req = indexedDB.open(dbInfo.name, dbInfo.version);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => {
                const db = req.result;
                const storeNames = Array.from(db.objectStoreNames);
                if (!storeNames.length) { resolve(); return; }
                const tx = db.transaction(storeNames, "readonly");
                Promise.all(storeNames.map(name => new Promise((res, rej) => {
                    result.indexedDB[dbInfo.name][name] = [];
                    const r = tx.objectStore(name).getAll();
                    r.onsuccess = () => { result.indexedDB[dbInfo.name][name] = sanitizeData(r.result, 1000, 100); res(); };
                    r.onerror = () => rej(r.error);
                }))).then(resolve);
            };
        });
    }
    const cacheNames = await caches.keys();
    for (const cacheName of cacheNames) {
        const cache = await caches.open(cacheName);
        result.caches[cacheName] = [];
        for (const req of await cache.keys()) {
            const res = await cache.match(req);
            if (!res) continue;
            const cloned = res.clone();
            const ct = cloned.headers.get('content-type') || '';
            let body;
            try {
                if (ct.includes('application/json')) body = await cloned.json();
                else if (ct.includes('text') || ct.includes('javascript')) body = await cloned.text();
                else body = btoa(String.fromCharCode(...new Uint8Array(await cloned.arrayBuffer())));
            } catch (e) { body = '[Unable to read body]'; }
            result.caches[cacheName].push({ url: req.url, body, contentType: ct });
        }
    }
    alert("Done, wait for the download to come");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
    a.download = `${Date.now()}.data`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function loadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    alert("This might take a while, dont touch anything other than this OK button");
    const reader = new FileReader();
    reader.onload = async function (e) {
        const data = JSON.parse(e.target.result);
        if (data.cookies) data.cookies.split(';').forEach(c => document.cookie = c.trim());
        if (data.localStorage) for (const k in data.localStorage) localStorage.setItem(k, data.localStorage[k]);
        if (data.sessionStorage) for (const k in data.sessionStorage) sessionStorage.setItem(k, data.sessionStorage[k]);
        if (data.indexedDB) {
            for (const dbName in data.indexedDB) {
                const stores = data.indexedDB[dbName];
                await new Promise((resolve, reject) => {
                    const req = indexedDB.open(dbName, 1);
                    req.onupgradeneeded = e => { const db = e.target.result; for (const s in stores) if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id', autoIncrement: true }); };
                    req.onsuccess = e => {
                        const db = e.target.result;
                        const tx = db.transaction(Object.keys(stores), 'readwrite');
                        tx.onerror = () => reject(tx.error);
                        let pending = Object.keys(stores).length;
                        for (const s in stores) { const os = tx.objectStore(s); os.clear().onsuccess = () => { for (const item of stores[s]) os.put(item); if (--pending === 0) resolve(); }; }
                    };
                    req.onerror = () => reject(req.error);
                });
            }
        }
        if (data.caches) {
            for (const cacheName in data.caches) {
                const cache = await caches.open(cacheName);
                await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
                for (const entry of data.caches[cacheName]) {
                    let body;
                    if (entry.contentType.includes('application/json')) body = JSON.stringify(entry.body);
                    else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) body = entry.body;
                    else { const b = atob(entry.body); const arr = new Uint8Array(b.length); for (let i = 0; i < b.length; i++) arr[i] = b.charCodeAt(i); body = arr.buffer; }
                    await cache.put(entry.url, new Response(body, { headers: new Headers({ 'content-type': entry.contentType }) }));
                }
            }
        }
        alert("Data loaded");
    };
    reader.readAsText(file);
}

let _allStatsCache = null;

async function getAllStats() {
    if (_allStatsCache) return _allStatsCache;
    const BASE_URL = "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files";
    let page = 1, done = false;
    const map = Object.create(null);
    while (!done) {
        const pages = Array.from({ length: 5 }, (_, i) => page + i);
        const responses = await Promise.all(pages.map(p => fetch(`${BASE_URL}?period=year&page=${p}&limit=100`).then(r => r.ok ? r.json() : [])));
        for (const data of responses) {
            if (!Array.isArray(data) || !data.length) { done = true; break; }
            for (const item of data) {
                if (!item?.name) continue;
                const m = item.name.match(/^\/(\d+)([.-])/);
                if (!m) continue;
                const id = m[1];
                if (!map[id]) map[id] = { hits: 0, bandwidth: 0 };
                map[id].hits += item.hits?.total ?? 0;
                map[id].bandwidth += item.bandwidth?.total ?? 0;
            }
        }
        page += 5;
    }
    _allStatsCache = map;
    return map;
}

async function getStats(id) {
    return (await getAllStats())[String(id)]?.hits ?? 0;
}
